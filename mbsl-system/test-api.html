<!DOCTYPE html>
<html>
<head>
    <title>API Test - MBSL Insurance</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; background: #0a2558; color: white; border: none; border-radius: 4px; }
        .result { margin-top: 20px; padding: 15px; background: #f0f0f0; border-radius: 4px; font-family: monospace; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        h2 { color: #0a2558; }
    </style>
</head>
<body>
<div class="container">
    <h1>MBSL Insurance - API Test</h1>
    
    <h2>Test Endpoints</h2>
    <button onclick="testList()">Test List Policies</button>
    <button onclick="testCreate()">Test Create Policy</button>
    <button onclick="testGet()">Test Get Policy (ID=1)</button>
    
    <div id="result" class="result" style="display:none;"></div>
</div>

<script>
async function testList() {
    const resultDiv = document.getElementById('result');
    resultDiv.style.display = 'block';
    resultDiv.innerHTML = 'Loading...';
    
    try {
        const response = await fetch('./api/controllers/Policy.php?action=list&limit=5&page=1');
        const data = await response.json();
        
        if (data.success) {
            resultDiv.className = 'result success';
            resultDiv.innerHTML = `
                <strong>✓ List Policies - SUCCESS</strong><br>
                Total Policies: ${data.total}<br>
                Policies Found: ${data.policies.length}<br>
                <pre>${JSON.stringify(data.policies.slice(0, 2), null, 2)}</pre>
            `;
        } else {
            resultDiv.className = 'result error';
            resultDiv.innerHTML = `<strong>✗ List Policies - FAILED</strong><br>${data.message}`;
        }
    } catch (err) {
        resultDiv.className = 'result error';
        resultDiv.innerHTML = `<strong>✗ Network Error</strong><br>${err.message}`;
    }
}

async function testCreate() {
    const resultDiv = document.getElementById('result');
    resultDiv.style.display = 'block';
    resultDiv.innerHTML = 'Creating policy...';
    
    const policyData = {
        title: 'Test Policy ' + new Date().getTime(),
        holder_name: 'Test User',
        category: 'Motor',
        premium_amount: 1500,
        description: 'Test policy created at ' + new Date().toLocaleString(),
        status: 'Active'
    };
    
    try {
        const response = await fetch('./api/controllers/Policy.php?action=create', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(policyData)
        });
        const data = await response.json();
        
        if (data.success) {
            resultDiv.className = 'result success';
            resultDiv.innerHTML = `
                <strong>✓ Create Policy - SUCCESS</strong><br>
                Message: ${data.message}<br>
                Policy ID: ${data.policy_id}<br>
                <small>Check the policies list to verify</small>
            `;
        } else {
            resultDiv.className = 'result error';
            resultDiv.innerHTML = `<strong>✗ Create Policy - FAILED</strong><br>${data.message}`;
        }
    } catch (err) {
        resultDiv.className = 'result error';
        resultDiv.innerHTML = `<strong>✗ Network Error</strong><br>${err.message}`;
    }
}

async function testGet() {
    const resultDiv = document.getElementById('result');
    resultDiv.style.display = 'block';
    resultDiv.innerHTML = 'Loading...';
    
    try {
        const response = await fetch('./api/controllers/Policy.php?action=get&id=1');
        const data = await response.json();
        
        if (data.success) {
            resultDiv.className = 'result success';
            resultDiv.innerHTML = `
                <strong>✓ Get Policy - SUCCESS</strong><br>
                <pre>${JSON.stringify(data.data, null, 2)}</pre>
            `;
        } else {
            resultDiv.className = 'result error';
            resultDiv.innerHTML = `<strong>✗ Get Policy - FAILED</strong><br>${data.message}`;
        }
    } catch (err) {
        resultDiv.className = 'result error';
        resultDiv.innerHTML = `<strong>✗ Network Error</strong><br>${err.message}`;
    }
}
</script>
</body>
</html>
